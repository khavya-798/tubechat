services:
  - type: web
    name: tubechat-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AZURE_OPENAI_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_CHAT_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_EMBEDDINGS_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_WHISPER_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
