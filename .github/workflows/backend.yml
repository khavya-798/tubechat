name: Deploy Backend to Azure App Service

on:
  push:
    branches: [main]
    paths: [backend/**]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install dependencies into package folder
        run: pip install -r backend/requirements.txt --target backend/.python_packages/lib/site-packages

      - name: Zip backend folder
        run: cd backend && zip -r ../backend.zip .

      - name: Deploy via Azure CLI
        run: |
          az webapp deploy \
            --name ${{ secrets.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --src-path backend.zip \
            --type zip
